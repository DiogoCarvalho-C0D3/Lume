version: '3.8'

services:
  db:
    image: timescale/timescaledb:latest-pg15
    environment:
      - POSTGRES_USER=lume_user
      - POSTGRES_PASSWORD=lume_pass
      - POSTGRES_DB=lume_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://lume_user:lume_pass@db:5432/lume_db
      - OS_API_BASE_URL=http://your-outsystems-server.com
      - OS_API_USERNAME=admin
      - OS_API_PASSWORD=password
      - SQL_SERVER_HOST=your-sql-server.com
      - SQL_SERVER_USER=lume_readonly
      - SQL_SERVER_PASSWORD=password
      - SQL_SERVER_DATABASE=os_platform
      - NODE_ENV=development
    depends_on:
      - db
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules

volumes:
  db_data:
